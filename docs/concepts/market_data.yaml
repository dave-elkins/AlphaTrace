concept_name: "MarketData"
domain: "Data Layer"
state:
  - ticker
  - date
  - open
  - high
  - low
  - close
  - adjusted_close
  - volume
  - market_cap
actions:
  - fetch_historical(company_id, start_date, end_date)
  - get_price_at(company_id, date)
