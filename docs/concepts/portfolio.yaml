concept_name: "Portfolio"
state:
  - list of position_id
  - total value
  - cash position
  - rebalancing rules
actions:
  - create(name, cash_position)
  - add_position(position_id)
  - remove_position(position_id)
  - rebalance()
  - update_cash(amount)
purpose: "Manages the focused portfolio as a whole. Enforces the 10-30 stock limit. Calculates allocation percentages."
operational_principle: "Enforces a maximum of 30 holdings; total value is the sum of all position values plus cash; allocation percentages are recalculated on position changes."
