concept_name: "Alert"
state:
  - alert type (price_drop, recalculation_needed, target_hit)
  - company_id
  - triggered_at
  - acknowledged
actions:
  - create(company_id, alert_type)
  - acknowledge(alert_id)
  - dismiss(alert_id)
purpose: "Keeps the user informed of important events."
operational_principle: "Triggered by predefined events; each alert is either acknowledged or dismissed, with no retry once resolved."
