concept_name: "IntrinsicValue"
state:
  - fair value estimate
  - growth rate assumption
  - discount rate (WACC)
  - terminal growth rate
  - DCF model inputs/outputs
actions:
  - calculate(company_id)
  - update_assumptions(growth_rate, discount_rate, terminal_rate)
  - recalculate()
purpose: "Calculates the fair value of a business based on cash flow projections."
operational_principle: "Fair value must be recalculated when the concept's key internal assumptions change or its stored financial data inputs are updated."
